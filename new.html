<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .main-container{
            background-color:white;
            height: 40vh;
            width: 900;
        }
        .main-container-2{
            background-color: rgb(30, 239, 30);
           height: 40vh;
        }
    .box{
        width: 400px;
        height: 550px;
        border: 1px solid rgb(178, 175, 175);
        background-color: white;
    }
    .write{
        display: flex;
        transform: translateY(100px);
        justify-content: space-around;
    }
    .write b{
        transform: translateY(80px);
        font-size: 45px;
        text-align: center;
        color: rgb(7, 3, 75);
     font-style: italic;
    }
     .write span{
        font-size: 30px;
        text-align: center;
        color: rgb(7, 3, 75);
     
    }
     .main{
        width: 1000px;
        height: 80vh;
        border: 1px solid black;
        margin: auto ;
        transform: translateY(100px);
     }
     .write-2 h1{
        max-width: 400px;
        font-size: 25px;
        padding: 40px;
        color: rgb(229, 252, 228);
        font-style: italic;
        
     }
     .write-3 P{
        padding: 50px 0 0 100px ;
        color: white;
     }
     .write-3 button{
        margin: 20px 0 0 110px ;
        font-size: 20px;
        padding: 7px;
        color: rgb(14, 8, 123);
     font-style: italic;
     font-weight: 700;
     background-color: white;
     border: none;
     }
    </style>
</head>
<body>
    <div class="main">

        <div class="main-container">
            <div class="write">
                <b>NEW <br> ARRIVAL <br><span>GET UP TO 30% OFF</span></b>
                <div class="box"></div>
            </div>
        </div>
        <div class="main-container-2">
            <div class="write-2">

                <h1>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Numquam adipisci quisquam.</h1>
            </div>
            <div class="write-3">
                <p>+123 456 789 123 <br> www.yourwebsite.com</p>
                <button>SHOP NOW</button>
            </div>
        </div>
    </div>
</body>
</html>

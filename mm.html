<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <input type="datetime-local" id="input1" onchange="myFunction(value)">
  <button id="checker"> click</button>
  <h1 id="write" > </h1>
 <script>
  let g ='' 
function myFunction(val) {
    g = val;
}
function ageCalculator(value){ 
    let now = new Date()
    let select = new Date(value)
    let year = now.getFullYear() - select.getFullYear()
    let month = now.getMonth()  - select.getMonth()
    let date = now.getDate() - select.getDate()
    if (date < 0) {
        month--
        date += new Date(now.getFullYear(),now.getMonth(),0).getDate()
    }
    if (month < 0) {
        year--
        month += 12
        
    }
    return {year,month,date}
}
document.getElementById(`checker`).addEventListener(`click`, function(){
 const guessing = ageCalculator(g);
 document.getElementById(`write`).innerHTML = guessing;});
 </script>
</body>
</html>
